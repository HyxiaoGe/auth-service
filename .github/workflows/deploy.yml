name: Deploy to Dev Server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  check:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Architecture check
        run: python3 scripts/check_architecture.py

      - name: Lint
        run: pip install ruff -q && ruff check .

  deploy:
    needs: check
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd ~/project/auth-service
          git fetch origin
          git reset --hard origin/main
          git clean -fd
          if git diff HEAD~1 --name-only | grep -qE 'requirements\.txt|Dockerfile|docker-compose'; then
            docker compose up -d --build
          else
            docker compose restart
          fi
          docker image prune -f
          docker builder prune --filter "until=72h" -f
