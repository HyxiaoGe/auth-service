name: 功能建议
description: 提议新的能力、集成方式或开发体验改进
title: "[Feature]: "
body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现相同建议。
          required: true
        - label: 此建议不包含真实凭据、个人数据或未公开的漏洞细节。
          required: true
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请描述当前场景、使用者和限制，不要只给出实现方案。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请说明期望行为、接口或配置形式。
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: 兼容性与安全影响
      description: 是否影响现有客户端、令牌、数据库迁移、权限边界或部署方式？
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 可选。说明已有替代做法及其不足。
