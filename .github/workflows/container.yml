name: Container image

on:
  pull_request:
    branches: ["main"]
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  validate:
    name: Container validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            auth-client/pyproject.toml

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e "./auth-client[fastapi]"

      - name: Validate source
        run: |
          python scripts/check_architecture.py
          python -m pytest -q tests auth-client/tests
          python -m ruff check .

      - name: Validate bundled and external Compose configuration
        run: |
          cp .env.example .env
          sed -i 's/replace-with-a-64-character-random-hex-value/0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef/g' .env
          docker compose config --quiet
          COMPOSE_PROFILES= \
          DATABASE_URL=postgresql+asyncpg://external:secret@db.example:5432/auth \
          DATABASE_URL_SYNC=postgresql://external:secret@db.example:5432/auth \
          REDIS_URL=redis://cache.example:6379/0 \
          docker compose config --quiet

  pr-image:
    name: Container build
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build pull request image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          platforms: linux/amd64
          push: false
          tags: auth-service:ci
          build-args: |
            VERSION=pr-${{ github.event.pull_request.number }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run self-hosting smoke test
        run: |
          set -euo pipefail
          cp .env.example .env
          sed -i 's/replace-with-a-64-character-random-hex-value/0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef/g' .env
          cleanup() {
            AUTH_SERVICE_IMAGE=auth-service:ci docker compose down -v
          }
          trap cleanup EXIT
          AUTH_SERVICE_IMAGE=auth-service:ci docker compose up -d
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8100/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              AUTH_SERVICE_IMAGE=auth-service:ci docker compose ps
              AUTH_SERVICE_IMAGE=auth-service:ci docker compose logs
              exit 1
            fi
            sleep 2
          done
          curl --fail --silent http://127.0.0.1:8100/.well-known/jwks.json | python -m json.tool >/dev/null
          AUTH_SERVICE_IMAGE=auth-service:ci docker compose exec -T auth \
            python -c "import json, urllib.request; response = urllib.request.urlopen('http://127.0.0.1:8100/health/ready', timeout=3); assert json.load(response)['status'] == 'ready'"
          test "$(AUTH_SERVICE_IMAGE=auth-service:ci docker compose exec -T auth id -u | tr -d '\r')" = "10001"
          before="$(AUTH_SERVICE_IMAGE=auth-service:ci docker compose exec -T auth sha256sum /app/keys/public.pem | cut -d' ' -f1)"
          AUTH_SERVICE_IMAGE=auth-service:ci docker compose run --rm bootstrap
          after="$(AUTH_SERVICE_IMAGE=auth-service:ci docker compose exec -T auth sha256sum /app/keys/public.pem | cut -d' ' -f1)"
          test "$before" = "$after"

  publish:
    name: Container publish
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Setup Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/hyxiaoge/auth-service
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and publish multi-platform image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Verify published platforms
        run: |
          docker buildx imagetools inspect "ghcr.io/hyxiaoge/auth-service:${GITHUB_REF_NAME}"
          for platform in linux/amd64 linux/arm64; do
            docker run --rm --platform "$platform" \
              --entrypoint python "ghcr.io/hyxiaoge/auth-service:${GITHUB_REF_NAME}" \
              -c "import app.main; import os; assert os.getuid() == 10001"
          done
