x-auth-image: &auth-image
  build:
    context: .
  image: auth-service:local

x-auth-runtime: &auth-runtime
  <<: *auth-image
  env_file:
    - ${AUTH_ENV_FILE:-.env}
  environment:
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-auth_service}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-auth_service}
    DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-auth_service}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-auth_service}
    REDIS_URL: redis://redis:6379/0

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auth_service}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-auth_service}
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - auth_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  migrate:
    <<: *auth-runtime
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  auth:
    <<: *auth-runtime
    ports:
      - "127.0.0.1:${APP_PORT:-8100}:8100"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health/ready', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  keygen:
    <<: *auth-image
    command: ["python", "scripts/generate_keys.py"]
    volumes:
      - ./keys:/app/keys
    profiles:
      - tools

volumes:
  auth_postgres_data:
  auth_redis_data:
