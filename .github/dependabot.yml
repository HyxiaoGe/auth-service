version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      runtime-web-minor-patch:
        patterns:
          - fastapi
          - uvicorn
          - httpx
          - authlib
          - pydantic
          - pydantic-settings
          - python-multipart
          - tldextract
        update-types:
          - minor
          - patch
      datastore-minor-patch:
        patterns:
          - sqlalchemy
          - asyncpg
          - psycopg2-binary
          - alembic
          - redis
        update-types:
          - minor
          - patch
      security-minor-patch:
        patterns:
          - PyJWT
          - cryptography
          - pwdlib
        update-types:
          - minor
          - patch
      dev-tools-minor-patch:
        patterns:
          - pytest
          - pytest-asyncio
          - fakeredis
          - ruff
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: "/auth-client"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      auth-client-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
