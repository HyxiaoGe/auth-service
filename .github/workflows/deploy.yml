name: Deploy to Dev Server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# 自托管 Runner 偶发卡在 Actions 缓存分片下载；超时后按缓存未命中继续安装依赖。
env:
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: "1"

jobs:
  check:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Architecture check
        run: python scripts/check_architecture.py

      - name: Test
        run: python -m pytest -q

      - name: Lint
        run: ~/.local/bin/ruff check .

  deploy:
    needs: check
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Record start time
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Deploy
        run: |
          cd ~/project/auth-service || exit 1
          previous_sha="$(git rev-parse HEAD)"
          migration_failed=0
          migration_succeeded=0
          auth_generation_cutover=0
          rollback_env="$(mktemp /tmp/auth-service-env.XXXXXX)"
          cp .env "$rollback_env"
          chmod 600 "$rollback_env"
          restore_source() {
            rollback_status=0
            if ! cp "$rollback_env" .env; then rollback_status=1; fi
            if ! git reset --hard "$previous_sha"; then rollback_status=1; fi
            if ! git clean -fd; then rollback_status=1; fi
            return "$rollback_status"
          }
          recover_stopped_previous() {
            rollback_status=0
            if ! restore_source; then rollback_status=1; fi
            if ! docker compose start auth; then rollback_status=1; fi
            recovered=0
            for attempt in {1..30}; do
              if docker exec auth-service python -c "import urllib.request; response = urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=3); assert response.status == 200"; then
                recovered=1
                break
              fi
              sleep 2
            done
            if [ "$recovered" -ne 1 ]; then rollback_status=1; fi
            return "$rollback_status"
          }
          rollback() {
            rollback_status=0
            echo "::warning::auth-service deployment failed; restoring ${previous_sha}"
            if ! restore_source; then rollback_status=1; fi
            # 本次数据库约束向后兼容，回滚应用时不执行 alembic downgrade。
            if ! docker compose build auth; then rollback_status=1; fi
            if ! docker compose up -d --no-build auth; then rollback_status=1; fi
            if ! docker exec auth-service python -c "import urllib.request; response = urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=3); assert response.status == 200"; then
              rollback_status=1
            fi
            return "$rollback_status"
          }
          cleanup() {
            rm -f "$rollback_env"
          }
          on_exit() {
            status=$?
            trap - EXIT
            if [ "$status" -ne 0 ]; then
              if [ "$auth_generation_cutover" -eq 1 ] && [ "$migration_succeeded" -eq 1 ]; then
                echo "::error::认证代际迁移已提交，禁止回滚到不兼容旧版本；保持安全失败并等待后续修复"
              elif [ "$migration_failed" -eq 1 ]; then
                if [ "$auth_generation_cutover" -eq 1 ]; then
                  echo "::warning::数据库迁移失败，恢复已停止的旧容器"
                  if ! recover_stopped_previous; then
                    echo "::error::auth-service old container recovery failed"
                  fi
                else
                  echo "::warning::数据库迁移失败，保持旧容器继续服务"
                  if ! restore_source; then
                    echo "::error::auth-service source restore failed"
                  fi
                fi
              elif ! rollback; then
                echo "::error::auth-service rollback failed"
              fi
            fi
            cleanup
            exit "$status"
          }
          trap on_exit EXIT
          git fetch origin
          git reset --hard origin/main
          git clean -fd
          if git diff --name-only "$previous_sha"..HEAD -- alembic/versions/c8d9e0f1a2b3_add_auth_generation.py | grep -Fxq "alembic/versions/c8d9e0f1a2b3_add_auth_generation.py"; then
            auth_generation_cutover=1
          fi
          # 先构建新镜像，再按迁移类型安全切换。
          docker compose build auth
          if [ "$auth_generation_cutover" -eq 1 ]; then
            # 旧实例不理解 auth_generation；迁移前先停流量，关闭双写协议窗口。
            docker compose stop auth
          fi
          if ! docker compose run --rm --no-deps auth alembic upgrade head; then
            migration_failed=1
            if [ "$auth_generation_cutover" -eq 1 ]; then
              echo "::error::数据库迁移失败，恢复已停止的旧容器"
            else
              echo "::error::数据库迁移失败，保持旧容器继续服务"
            fi
            exit 1
          fi
          migration_succeeded=1
          docker compose up -d --no-build auth
          for attempt in {1..30}; do
            if docker exec auth-service python -c "import json, urllib.request; response = urllib.request.urlopen('http://127.0.0.1:8100/health/ready', timeout=3); assert response.status == 200; assert json.load(response)['status'] == 'ready'"; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              exit 1
            fi
            sleep 2
          done
          # 等待启动 monitor 的专用 SMTP 预检结果；health 本身不再重复发送测试邮件。
          docker exec auth-service python -c "import json, urllib.request; from app.config import get_settings; timeout = get_settings().smtp_timeout_seconds * 4 + 20; response = urllib.request.urlopen('http://127.0.0.1:8100/health/email-delivery', timeout=timeout); assert response.status == 200; assert json.load(response)['status'] in ('disabled', 'ready')"
          trap - EXIT
          cleanup
          docker image prune -f || true
          docker builder prune --filter "until=72h" -f || true

      - name: Push deploy metrics
        if: always()
        run: bash ~/scripts/push-deploy-metrics.sh auth-service main ${{ job.status }} ${{ env.BUILD_START }}
