name: Deploy to Dev Server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  check:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Architecture check
        run: python scripts/check_architecture.py

      - name: Test
        run: python -m pytest -q

      - name: Lint
        run: ~/.local/bin/ruff check .

  deploy:
    needs: check
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Record start time
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Deploy
        run: |
          cd ~/project/auth-service || exit 1
          previous_sha="$(git rev-parse HEAD)"
          rollback_env="$(mktemp /tmp/auth-service-env.XXXXXX)"
          cp .env "$rollback_env"
          chmod 600 "$rollback_env"
          rollback() {
            rollback_status=0
            echo "::warning::auth-service deployment failed; restoring ${previous_sha}"
            if ! cp "$rollback_env" .env; then rollback_status=1; fi
            if ! git reset --hard "$previous_sha"; then rollback_status=1; fi
            if ! git clean -fd; then rollback_status=1; fi
            if ! docker compose up -d --build; then rollback_status=1; fi
            if ! docker exec auth-service python -c "import urllib.request; response = urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=3); assert response.status == 200"; then
              rollback_status=1
            fi
            return "$rollback_status"
          }
          cleanup() {
            rm -f "$rollback_env"
          }
          on_exit() {
            status=$?
            trap - EXIT
            if [ "$status" -ne 0 ] && ! rollback; then
              echo "::error::auth-service rollback failed"
            fi
            cleanup
            exit "$status"
          }
          trap on_exit EXIT
          git fetch origin
          git reset --hard origin/main
          git clean -fd
          docker compose up -d --build
          for attempt in {1..30}; do
            if docker exec auth-service python -c "import json, urllib.request; response = urllib.request.urlopen('http://127.0.0.1:8100/health/ready', timeout=3); assert response.status == 200; assert json.load(response)['status'] == 'ready'"; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              exit 1
            fi
            sleep 2
          done
          # 提交一封专用部署预检邮件，仅验证 SMTP 接受；不证明收件箱送达或 SPF/DKIM。
          docker exec auth-service python -c "import json, urllib.request; response = urllib.request.urlopen('http://127.0.0.1:8100/health/email-delivery', timeout=15); assert response.status == 200; assert json.load(response)['status'] in ('disabled', 'ready')"
          trap - EXIT
          cleanup
          docker image prune -f || true
          docker builder prune --filter "until=72h" -f || true

      - name: Push deploy metrics
        if: always()
        run: bash ~/scripts/push-deploy-metrics.sh auth-service main ${{ job.status }} ${{ env.BUILD_START }}
