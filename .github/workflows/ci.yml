name: Pull Request CI

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    name: Python 3.12 checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            auth-client/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install "build==1.3.0" "twine==6.2.0"
          python -m pip install -e "./auth-client[fastapi]"

      - name: Architecture check
        run: python scripts/check_architecture.py

      - name: Test
        run: python -m pytest -q tests auth-client/tests

      - name: Lint
        run: python -m ruff check .

      - name: Build and validate Python client distributions
        run: |
          python -m build auth-client --outdir "$RUNNER_TEMP/auth-client-dist"
          python -m twine check "$RUNNER_TEMP"/auth-client-dist/*
          python auth-client/scripts/check_dist.py "$RUNNER_TEMP/auth-client-dist"
