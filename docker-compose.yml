services:
  auth:
    build: .
    container_name: auth-service
    # 维护者 dev 环境继续读取历史宿主机密钥挂载；公开镜像默认使用非 root 用户。
    user: "0:0"
    expose:
      - "8100"
    env_file:
      - ${AUTH_ENV_FILE:-.env}
    volumes:
      - ./app:/app/app
      - ./keys:/app/keys
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    restart: unless-stopped
    mem_limit: 256m
    networks:
      - nano-banana-network
      - postgres_default
      - middleware_default
      - ai-audio-network

networks:
  nano-banana-network:
    external: true
  postgres_default:
    external: true
  middleware_default:
    external: true
  ai-audio-network:
    external: true
